title = "IT Support Native secret scanning"

[extend]
useDefault = true

[[allowlists]]
description = "Ignore local SDKs, tools, caches, and generated outputs."
paths = [
  '''(^|/)\.dotnet/''',
  '''(^|/)\.dotnet-home/''',
  '''(^|/)\.git/''',
  '''(^|/)\.packages/''',
  '''(^|/)\.tools/''',
  '''(^|/)(\.next|bin|dist|generated|node_modules|obj)/''',
]
