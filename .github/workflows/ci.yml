name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack install --global pnpm@11.5.3

      - name: Restore .NET dependencies
        run: dotnet restore ITSupportNative.slnx --locked-mode

      - name: Verify .NET format
        run: dotnet format ITSupportNative.slnx --verify-no-changes --no-restore

      - name: Build .NET solution
        run: dotnet build ITSupportNative.slnx --configuration Release --no-restore

      - name: Test .NET solution
        run: dotnet test ITSupportNative.slnx --configuration Release --no-build

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Node workspace
        run: pnpm run check

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
